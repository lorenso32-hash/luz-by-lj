<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enrique — Luz by LJ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #050121;
      --pink: #E21056;
      --teal: #00B4CC;
      --font-display: 'Bebas Neue', sans-serif;
      --font-serif: 'Playfair Display', serif;
      --font-body: 'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--navy);
      color: #fff;
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Starfield */
    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Nav */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(5,1,33,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,180,204,0.15);
      padding: 0 5vw;
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    .nav-logo img {
      height: 32px;
      width: auto;
      filter: drop-shadow(0 0 6px rgba(226,16,86,0.6));
    }
    .nav-back {
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--teal);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-back:hover { color: #fff; }

    /* Hero */
    .client-hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 64px 5vw 48px;
    }
    .client-eyebrow {
      font-family: var(--font-body);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 12px;
    }
    .client-name {
      font-family: var(--font-display);
      font-size: clamp(3rem, 8vw, 6rem);
      letter-spacing: 4px;
      line-height: 1;
      color: #fff;
      text-shadow: 0 0 30px rgba(226,16,86,0.4), 0 0 60px rgba(226,16,86,0.2);
      margin-bottom: 12px;
    }
    .client-meta {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 36px;
    }
    .btn-download-all {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--pink);
      color: #fff;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 32px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 20px rgba(226,16,86,0.4);
    }
    .btn-download-all:hover {
      background: #ff1a6b;
      box-shadow: 0 0 32px rgba(226,16,86,0.7);
    }
    .btn-download-all svg { width: 16px; height: 16px; }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--teal), transparent);
      margin: 0 auto 48px;
    }

    /* Gallery grid */
    .gallery-wrap {
      position: relative;
      z-index: 1;
      padding: 0 3vw 80px;
    }
    .photo-count {
      font-family: var(--font-body);
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      text-align: center;
      margin-bottom: 32px;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    @media (max-width: 900px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 500px) {
      .gallery-grid { grid-template-columns: 1fr; }
    }

    .photo-card {
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      aspect-ratio: 2/3;
    }
    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .photo-card:hover img {
      transform: scale(1.05);
    }

    /* Hover overlay */
    .photo-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(5,1,33,0.9) 0%, rgba(5,1,33,0.5) 50%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px 16px 16px;
      gap: 8px;
    }
    .photo-card:hover .photo-overlay {
      opacity: 1;
    }
    .photo-filename {
      font-family: var(--font-body);
      font-size: 0.65rem;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 4px;
    }
    .download-btns {
      display: flex;
      gap: 6px;
    }
    .dl-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 8px 6px;
      font-family: var(--font-body);
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid;
      transition: background 0.2s, color 0.2s;
      cursor: pointer;
    }
    .dl-btn svg { width: 10px; height: 10px; flex-shrink: 0; }
    .dl-btn-web {
      color: var(--teal);
      border-color: var(--teal);
      background: rgba(0,180,204,0.1);
    }
    .dl-btn-web:hover {
      background: var(--teal);
      color: var(--navy);
    }
    .dl-btn-full {
      color: var(--pink);
      border-color: var(--pink);
      background: rgba(226,16,86,0.1);
    }
    .dl-btn-full:hover {
      background: var(--pink);
      color: #fff;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(5,1,33,0.96);
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox-img {
      max-width: 88vw;
      max-height: 88vh;
      object-fit: contain;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
    }
    .lb-close {
      position: absolute;
      top: 24px;
      right: 32px;
      font-size: 2rem;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
      background: none;
      border: none;
    }
    .lb-close:hover { color: #fff; }
    .lb-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      padding: 20px;
      background: none;
      border: none;
      transition: color 0.2s;
    }
    .lb-nav:hover { color: #fff; }
    .lb-prev { left: 16px; }
    .lb-next { right: 16px; }
    .lb-counter {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-body);
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.4);
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 32px 5vw;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-family: var(--font-body);
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.25);
    }
    footer a { color: var(--teal); text-decoration: none; }
  </style>
</head>
<body>

<canvas id="starfield"></canvas>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo"><img src="../Luz By LJ Logo 2.png" alt="Luz by LJ"></a>
    <a href="/" class="nav-back">← Back to Site</a>
  </div>
</nav>

<section class="client-hero">
  <div class="client-eyebrow">Client Gallery · Luz by LJ</div>
  <h1 class="client-name">Enrique</h1>
  <p class="client-meta">Shoot 1 &nbsp;·&nbsp; 2026</p>
  <a class="btn-download-all" href="https://drive.google.com/drive/folders/1NPHJh4m7DiTg2HKDVWgTodPEnpYmDojE" target="_blank">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download All
  </a>
</section>

<div class="divider"></div>

<div class="gallery-wrap">
  <p class="photo-count">20 photos</p>
  <div class="gallery-grid" id="gallery-grid">
  </div>
</div>

<footer>
  <p>© 2026 <a href="/">Luz by LJ</a> &nbsp;·&nbsp; LuzByLJ@gmail.com &nbsp;·&nbsp; +1 (505) 818-1929</p>
</footer>

<div id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">&#215;</button>
  <button class="lb-nav lb-prev" onclick="event.stopPropagation(); lbNav(-1)">&#8592;</button>
  <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()">
  <button class="lb-nav lb-next" onclick="event.stopPropagation(); lbNav(1)">&#8594;</button>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<script>
// ─── Photos ──────────────────────────────────────────────────────────────────
const photos = [
  { id: '1wYSwFYvD2otyizIBroh_lCAs-LmXyqx0', name: 'Enrique-2.jpg' },
  { id: '1q7qQGW9dMvHTQ1-R4X7MsD6ww6pGgem1', name: 'Enrique-22.jpg' },
  { id: '1zkwB7ReUZSS58FTRN8bb2VSaH2HZYYYt', name: 'Enrique-23.jpg' },
  { id: '1agIjUz51NT6GR5G9lQRiuzJa_M58_D9t', name: 'Enrique-24.jpg' },
  { id: '1kEa9rkIXEXEqP0ysNEz0_Ru-FsudE99u', name: 'Enrique-26.jpg' },
  { id: '1J8UdvQwsYzLg9pAgEH3cUxRvhYbAHZ4o', name: 'Enrique-27.jpg' },
  { id: '1tULsVp5MXeR4VXmA4dUcSc-vVtPHeMGc', name: 'Enrique-28.jpg' },
  { id: '1T78rJWNoprhgrFELqJVKMtYrfnMjBv3R', name: 'Enrique-29.jpg' },
  { id: '18xW_2k8xc35--r9mKOh3RjV5E6HW6XtR', name: 'Enrique-30.jpg' },
  { id: '1BPnWGzr28Ipz2TlGPW1ZxA5vR6XFvFqb', name: 'Enrique-31.jpg' },
  { id: '11lHt-Et-Sh2LQ_zBnsOzsZFeXPr_rLsn', name: 'Enrique-32.jpg' },
  { id: '176lHEqslyiQGmaiVYL_iDj7IHAg61Gdt', name: 'Enrique-33.jpg' },
  { id: '1ZNW3JU60s6bG_OCuunct-QLzB15IHK6c', name: 'Enrique-36.jpg' },
  { id: '1y7d0T8_MLaDtI471IgdaH72dtqTh9Tat', name: 'Enrique-37.jpg' },
  { id: '1Kn6IIPfQQVPFWazjoNZk9fE5ij6qwNce', name: 'Enrique-38.jpg' },
  { id: '19JJU5VG_qUhDlUyOG4RTH5RFFUEdJ8l9', name: 'Enrique-39.jpg' },
  { id: '1hnMWHy0h2oAIJDEf6E_H88I4z7O-qBWS', name: 'Enrique-40.jpg' },
  { id: '1M9-XHJhyTHi9-CNdYEtWWdDToQZl2xWy', name: 'Enrique-41.jpg' },
  { id: '1ed_yA1YIlulOE-XcVNL5wmIjFmQ6Ei_w', name: 'Enrique-42.jpg' },
  { id: '1nNCuJAQo_PTYzSJHH6irD_ifjstasN69', name: 'Enrique.jpg' },
];

const thumbUrl = (id, w) => `https://drive.google.com/thumbnail?id=${id}&sz=w${w}`;
const downloadUrl = (id) => `https://drive.google.com/uc?export=download&id=${id}`;

// ─── Build grid ───────────────────────────────────────────────────────────────
const grid = document.getElementById('gallery-grid');
const dlIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;

photos.forEach((photo, i) => {
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.innerHTML = `
    <img loading="lazy" referrerpolicy="no-referrer" src="${thumbUrl(photo.id, 800)}" alt="${photo.name}">
    <div class="photo-overlay">
      <div class="photo-filename">${photo.name}</div>
      <div class="download-btns">
        <a class="dl-btn dl-btn-web" href="${thumbUrl(photo.id, 2000)}" target="_blank" onclick="event.stopPropagation()">${dlIcon} Web</a>
        <a class="dl-btn dl-btn-full" href="${downloadUrl(photo.id)}" target="_blank" onclick="event.stopPropagation()">${dlIcon} Full Res</a>
      </div>
    </div>
  `;
  card.addEventListener('click', () => openLightbox(i));
  grid.appendChild(card);
});

// ─── Lightbox ─────────────────────────────────────────────────────────────────
let currentIndex = 0;
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lightbox-img');
const lbCounter = document.getElementById('lb-counter');

function openLightbox(i) {
  currentIndex = i;
  lbImg.src = thumbUrl(photos[i].id, 2000);
  lbCounter.textContent = `${i + 1} / ${photos.length}`;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  lb.classList.remove('open');
  document.body.style.overflow = '';
}
function lbNav(dir) {
  currentIndex = (currentIndex + dir + photos.length) % photos.length;
  openLightbox(currentIndex);
}
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'Escape') closeLightbox();
});

// ─── Starfield ────────────────────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [];
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  function initStars() {
    stars = [];
    for (let i = 0; i < 180; i++) {
      stars.push({
        x: Math.random() * W, y: Math.random() * H,
        r: Math.random() * 1.2 + 0.2,
        a: Math.random(),
        speed: Math.random() * 0.003 + 0.001,
        phase: Math.random() * Math.PI * 2
      });
    }
  }
  function draw(t) {
    ctx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      const a = s.a * (0.5 + 0.5 * Math.sin(t * s.speed * 1000 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize();
  initStars();
  window.addEventListener('resize', () => { resize(); initStars(); });
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>

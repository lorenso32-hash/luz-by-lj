<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Levi Platero Live @ Tumbleroot — Luz by LJ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #050121;
      --pink: #E21056;
      --teal: #00B4CC;
      --font-display: 'Bebas Neue', sans-serif;
      --font-serif: 'Playfair Display', serif;
      --font-body: 'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--navy);
      color: #fff;
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(5,1,33,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,180,204,0.15);
      padding: 0 5vw;
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    .nav-logo img {
      height: 32px;
      width: auto;
      filter: drop-shadow(0 0 6px rgba(226,16,86,0.6));
    }
    .nav-back {
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--teal);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-back:hover { color: #fff; }

    .client-hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 64px 5vw 48px;
    }
    .client-eyebrow {
      font-family: var(--font-body);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 12px;
    }
    .client-name {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      letter-spacing: 4px;
      line-height: 1;
      color: #fff;
      text-shadow: 0 0 30px rgba(226,16,86,0.4), 0 0 60px rgba(226,16,86,0.2);
      margin-bottom: 12px;
    }
    .client-meta {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 36px;
    }

    .hero-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-download-all {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--pink);
      color: #fff;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 32px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 20px rgba(226,16,86,0.4);
    }
    .btn-download-all:hover {
      background: #ff1a6b;
      box-shadow: 0 0 32px rgba(226,16,86,0.7);
    }
    .btn-fullres-all {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--teal);
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 32px;
      border: 1px solid var(--teal);
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .btn-fullres-all:hover {
      background: rgba(0,180,204,0.1);
      box-shadow: 0 0 20px rgba(0,180,204,0.3);
    }
    .btn-download-all svg,
    .btn-fullres-all svg { width: 16px; height: 16px; }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--teal), transparent);
      margin: 0 auto 48px;
    }

    .gallery-wrap {
      position: relative;
      z-index: 1;
      padding: 0 3vw 80px;
    }
    .photo-count {
      font-family: var(--font-body);
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      text-align: center;
      margin-bottom: 32px;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    @media (max-width: 900px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 500px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 4px; }
    }

    .photo-card {
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      aspect-ratio: 2/3;
    }
    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .photo-card:hover img { transform: scale(1.05); }

    .photo-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(5,1,33,0.9) 0%, rgba(5,1,33,0.5) 50%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px 16px 16px;
      gap: 8px;
    }
    .photo-card:hover .photo-overlay { opacity: 1; }

    .photo-filename {
      font-family: var(--font-body);
      font-size: 0.65rem;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 4px;
    }
    .download-btns { display: flex; gap: 6px; }
    .dl-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 8px 6px;
      font-family: var(--font-body);
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid;
      transition: background 0.2s, color 0.2s;
      cursor: pointer;
    }
    .dl-btn svg { width: 10px; height: 10px; flex-shrink: 0; }
    .dl-btn-web { color: var(--teal); border-color: var(--teal); background: rgba(0,180,204,0.1); }
    .dl-btn-web:hover { background: var(--teal); color: var(--navy); }
    .dl-btn-full { color: var(--pink); border-color: var(--pink); background: rgba(226,16,86,0.1); }
    .dl-btn-full:hover { background: var(--pink); color: #fff; }

    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(5,1,33,0.96);
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox-img {
      max-width: 88vw;
      max-height: 88vh;
      object-fit: contain;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
    }
    .lb-close {
      position: absolute; top: 24px; right: 32px;
      font-size: 2rem; color: rgba(255,255,255,0.5);
      cursor: pointer; transition: color 0.2s;
      line-height: 1; background: none; border: none;
    }
    .lb-close:hover { color: #fff; }
    .lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      font-size: 2rem; color: rgba(255,255,255,0.4);
      cursor: pointer; padding: 20px;
      background: none; border: none; transition: color 0.2s;
    }
    .lb-nav:hover { color: #fff; }
    .lb-prev { left: 16px; }
    .lb-next { right: 16px; }
    .lb-counter {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      font-family: var(--font-body); font-size: 0.7rem;
      letter-spacing: 3px; color: rgba(255,255,255,0.4);
    }

    footer {
      position: relative; z-index: 1;
      text-align: center; padding: 32px 5vw;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-family: var(--font-body); font-size: 0.7rem;
      letter-spacing: 2px; color: rgba(255,255,255,0.25);
    }
    footer a { color: var(--teal); text-decoration: none; }
  </style>
</head>
<body>

<canvas id="starfield"></canvas>

<nav>
  <div class="nav-inner">
    <a href="https://luzbylj.com" class="nav-logo"><img src="../Luz By LJ Logo 2.png" alt="Luz by LJ"></a>
    <a href="https://luzbylj.com" class="nav-back">← Back to Site</a>
  </div>
</nav>

<section class="client-hero">
  <div class="client-eyebrow">Client Gallery · Luz by LJ</div>
  <h1 class="client-name">Levi Platero Live @ Tumbleroot</h1>
  <p class="client-meta">Live Show &nbsp;·&nbsp; 2026</p>
  <div class="hero-btns">
    <a class="btn-download-all" href="#" onclick="downloadAllWeb(event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download Web Size
    </a>
    <a class="btn-fullres-all" href="https://drive.google.com/drive/folders/1y2Qjq8wHAUGWCxIQ4lgLiIXyJg_dMG1p?usp=sharing" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Full Res — Drive
    </a>
  </div>
</section>

<div class="divider"></div>

<div class="gallery-wrap">
  <p class="photo-count">35 photos</p>
  <div class="gallery-grid" id="gallery-grid"></div>
</div>

<footer>
  <p>© 2026 <a href="https://luzbylj.com">Luz by LJ</a> &nbsp;·&nbsp; LuzByLJ@gmail.com &nbsp;·&nbsp; +1 (505) 818-1929</p>
</footer>

<div id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">&#215;</button>
  <button class="lb-nav lb-prev" onclick="event.stopPropagation(); lbNav(-1)">&#8592;</button>
  <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()">
  <button class="lb-nav lb-next" onclick="event.stopPropagation(); lbNav(1)">&#8594;</button>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<script>
// ─── Photos (local web-size files) ───────────────────────────────────────────
const photos = [
  'Untitled.jpg',
  'Untitled-2.jpg',
  'Untitled-3.jpg',
  'Untitled-4.jpg',
  'Untitled-5.jpg',
  'Untitled-6.jpg',
  'Untitled-7.jpg',
  'Untitled-8.jpg',
  'Untitled-9.jpg',
  'Untitled-10.jpg',
  'Untitled-11.jpg',
  'Untitled-12.jpg',
  'Untitled-13.jpg',
  'Untitled-14.jpg',
  'Untitled-15.jpg',
  'Untitled-16.jpg',
  'Untitled-17.jpg',
  'Untitled-18.jpg',
  'Untitled-19.jpg',
  'Untitled-20.jpg',
  'Untitled-21.jpg',
  'Untitled-22.jpg',
  'Untitled-23.jpg',
  'Untitled-24.jpg',
  'Untitled-25.jpg',
  'Untitled-26.jpg',
  'Untitled-27.jpg',
  'Untitled-28.jpg',
  'Untitled-29.jpg',
  'Untitled-30.jpg',
  'Untitled-31.jpg',
  'Untitled-32.jpg',
  'Untitled-33.jpg',
  'Untitled-34.jpg',
  'Untitled-35.jpg',
];

const basePath = '../photos/levi/';
const dlIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;

// ─── Build grid ───────────────────────────────────────────────────────────────
const grid = document.getElementById('gallery-grid');

photos.forEach((name, i) => {
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.innerHTML = `
    <img loading="lazy" src="${basePath}${name}" alt="${name}">
    <div class="photo-overlay">
      <div class="photo-filename">${name}</div>
      <div class="download-btns">
        <a class="dl-btn dl-btn-web" href="${basePath}${name}" download="${name.replace(/\.jpg$/i,'-web.jpg')}" onclick="event.stopPropagation()">${dlIcon} Web</a>
        <a class="dl-btn dl-btn-full" href="https://drive.google.com/drive/folders/1y2Qjq8wHAUGWCxIQ4lgLiIXyJg_dMG1p?usp=sharing" target="_blank" onclick="event.stopPropagation()">${dlIcon} Full Res</a>
      </div>
    </div>
  `;
  card.addEventListener('click', () => openLightbox(i));
  grid.appendChild(card);
});

// ─── Download all web ─────────────────────────────────────────────────────────
function downloadAllWeb(e) {
  e.preventDefault();
  photos.forEach((name, i) => {
    setTimeout(() => {
      const a = document.createElement('a');
      a.href = basePath + name;
      a.download = name.replace(/\.jpg$/i, '-web.jpg');
      a.click();
    }, i * 300);
  });
}

// ─── Lightbox ─────────────────────────────────────────────────────────────────
let currentIndex = 0;
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lightbox-img');
const lbCounter = document.getElementById('lb-counter');

function openLightbox(i) {
  currentIndex = i;
  lbImg.src = basePath + photos[i];
  lbCounter.textContent = `${i + 1} / ${photos.length}`;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  lb.classList.remove('open');
  document.body.style.overflow = '';
}
function lbNav(dir) {
  currentIndex = (currentIndex + dir + photos.length) % photos.length;
  openLightbox(currentIndex);
}
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'Escape') closeLightbox();
});

// ─── Pinch-safe touch swipe ───────────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0, isPinch = false;
lb.addEventListener('touchstart', e => {
  if (e.touches.length > 1) { isPinch = true; return; }
  isPinch = false;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
lb.addEventListener('touchmove', e => {
  if (e.touches.length > 1) isPinch = true;
}, { passive: true });
lb.addEventListener('touchend', e => {
  if (isPinch) { isPinch = false; return; }
  const diffX = touchStartX - e.changedTouches[0].clientX;
  const diffY = touchStartY - e.changedTouches[0].clientY;
  if (Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY)) lbNav(diffX > 0 ? 1 : -1);
}, { passive: true });

// ─── Starfield ────────────────────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function initStars() {
    stars = [];
    for (let i = 0; i < 180; i++) {
      stars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.2+0.2, a: Math.random(), speed: Math.random()*0.003+0.001, phase: Math.random()*Math.PI*2 });
    }
  }
  function draw(t) {
    ctx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      const a = s.a * (0.5 + 0.5 * Math.sin(t * s.speed * 1000 + s.phase));
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${a})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); initStars();
  window.addEventListener('resize', () => { resize(); initStars(); });
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>

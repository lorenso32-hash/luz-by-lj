// ─── Build grid ───────────────────────────────────────────────────────────────
const grid = document.getElementById('gallery-grid');

photos.forEach((photo, i) => {
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.innerHTML = `
    <img loading="lazy" src="${driveImg(photo.webId)}" alt="Live show ${i + 1}">
    <div class="photo-overlay">
      <div class="photo-filename">Photo ${i + 1} of ${photos.length}</div>
      <div class="download-btns">
        <a class="dl-btn dl-btn-web" href="${driveDl(photo.webId)}" target="_blank" onclick="event.stopPropagation()">${dlIcon} Web</a>
        <a class="dl-btn dl-btn-full" href="${driveDl(photo.fullId)}" target="_blank" onclick="event.stopPropagation()">${dlIcon} Full Res</a>
      </div>
    </div>
  `;
  card.addEventListener('click', () => openLightbox(i));
  grid.appendChild(card);
});

// ─── Download all web ─────────────────────────────────────────────────────────
function downloadAllWeb(e) {
  e.preventDefault();
  window.open('https://drive.google.com/drive/folders/1UfUIuUU29U0QfNvY51L1EooFA8ww1Z5K', '_blank');
}

// ─── Lightbox ─────────────────────────────────────────────────────────────────
let currentIndex = 0;
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lightbox-img');
const lbCounter = document.getElementById('lb-counter');

function openLightbox(i) {
  currentIndex = i;
  lbImg.src = driveImg(photos[i].webId);
  lbCounter.textContent = `${i + 1} / ${photos.length}`;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  lb.classList.remove('open');
  document.body.style.overflow = '';
}
function lbNav(dir) {
  currentIndex = (currentIndex + dir + photos.length) % photos.length;
  openLightbox(currentIndex);
}
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'Escape') closeLightbox();
});

// ─── Pinch-safe touch swipe ───────────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0, isPinch = false;
lb.addEventListener('touchstart', e => {
  if (e.touches.length > 1) { isPinch = true; return; }
  isPinch = false;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
lb.addEventListener('touchmove', e => {
  if (e.touches.length > 1) isPinch = true;
}, { passive: true });
lb.addEventListener('touchend', e => {
  if (isPinch) { isPinch = false; return; }
  const diffX = touchStartX - e.changedTouches[0].clientX;
  const diffY = touchStartY - e.changedTouches[0].clientY;
  if (Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY)) lbNav(diffX > 0 ? 1 : -1);
}, { passive: true });

// ─── Starfield ────────────────────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function initStars() {
    stars = [];
    for (let i = 0; i < 180; i++) {
      stars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.2+0.2, a: Math.random(), speed: Math.random()*0.003+0.001, phase: Math.random()*Math.PI*2 });
    }
  }
  function draw(t) {
    ctx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      const a = s.a * (0.5 + 0.5 * Math.sin(t * s.speed * 1000 + s.phase));
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${a})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); initStars();
  window.addEventListener('resize', () => { resize(); initStars(); });
  requestAnimationFrame(draw);
})();

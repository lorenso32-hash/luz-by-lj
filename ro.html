  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #050121;
      --navy-mid:   #080230;
      --navy-light: #0d0535;
      --pink:       #E21056;
      --pink-glow:  rgba(226, 16, 86, 0.35);
      --teal:       #00B4CC;
      --teal-glow:  rgba(0, 180, 204, 0.35);
      --white:      #FFFFFF;
      --white-80:   rgba(255,255,255,0.80);
      --white-60:   rgba(255,255,255,0.60);
      --white-20:   rgba(255,255,255,0.20);
      --white-10:   rgba(255,255,255,0.10);
      --white-06:   rgba(255,255,255,0.06);

      --font-display: 'Bebas Neue', sans-serif;
      --font-serif:   'Playfair Display', serif;
      --font-body:    'Inter', sans-serif;

      --max-w:  1100px;
      --pad-x:  40px;
      --nav-h:  68px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--navy);
      color: var(--white);
      font-family: var(--font-body);
      font-weight: 300;
      line-height: 1.75;
      overflow-x: hidden;
      animation: pagefade 0.45s ease;
    }
    @keyframes pagefade { from { opacity:0; } to { opacity:1; } }

    .milky-way {
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      pointer-events: none;
      z-index: 0;
      background: linear-gradient(
        108deg,
        transparent 0%, transparent 28%,
        rgba(160,130,255,0.018) 35%,
        rgba(200,175,255,0.045) 43%,
        rgba(220,200,255,0.055) 50%,
        rgba(200,175,255,0.045) 57%,
        rgba(160,130,255,0.018) 64%,
        transparent 71%, transparent 100%
      );
    }
    .star {
      position: fixed; border-radius: 50%; background: white;
      pointer-events: none; z-index: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.05; } 50% { opacity: 0.75; }
    }
    @keyframes twinkle-glow {
      0%, 100% { opacity: 0.08; box-shadow: none; }
      50% { opacity: 0.95; box-shadow: 0 0 5px 2px rgba(200,185,255,0.45); }
    }

    .container { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--pad-x); }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(5,1,33,0.85);
      backdrop-filter: blur(12px);
      z-index: 100;
      border-bottom: 1px solid var(--white-10);
    }
    .nav-inner {
      max-width: var(--max-w); margin: 0 auto; padding: 0 var(--pad-x);
      height: 100%; display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo img { height: 36px; display: block; }
    .nav-main-btn {
      font-family: var(--font-display);
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      text-decoration: none; color: var(--white-60);
      border: 1px solid var(--white-20); padding: 7px 16px; border-radius: 2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .nav-main-btn:hover { color: var(--teal); border-color: var(--teal); }

    /* HEADER */
    .page-header {
      padding: 140px 0 50px;
      text-align: center;
      position: relative; z-index: 1;
    }
    .eyebrow {
      font-family: var(--font-display);
      font-size: 26px; letter-spacing: 6px;
      color: var(--teal); text-transform: uppercase;
      margin-bottom: 12px;
      animation: eyebrow-shimmer 3s ease-in-out infinite;
    }
    @keyframes eyebrow-shimmer {
      0%, 100% { text-shadow: 0 0 4px rgba(0,180,204,0.3), 0 0 8px rgba(0,180,204,0.1); opacity: 0.7; }
      50% { text-shadow: 0 0 16px rgba(0,180,204,1), 0 0 36px rgba(0,180,204,0.7), 0 0 64px rgba(0,180,204,0.3); opacity: 1; }
    }
    .page-title {
      font-family: var(--font-serif);
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 700; line-height: 1.1; margin-bottom: 16px;
      text-shadow: 0 0 12px rgba(255,255,255,0.25);
    }
    .rule-accent {
      width: 56px; height: 2px;
      background: linear-gradient(90deg, var(--pink), var(--teal));
      margin: 0 auto 28px;
    }

    .page-subtitle {
      font-size: 1.15rem;
      color: var(--white-80);
      letter-spacing: 0.5px;
      max-width: 540px;
      margin: 0 auto;
      animation: subtitle-glow 3s ease-in-out infinite;
    }
    @keyframes subtitle-glow {
      0%, 100% { text-shadow: 0 0 6px rgba(226,16,86,0.3), 0 0 12px rgba(226,16,86,0.1); }
      50% { text-shadow: 0 0 14px rgba(226,16,86,0.8), 0 0 30px rgba(226,16,86,0.4), 0 0 50px rgba(226,16,86,0.15); }
    }

    /* DOWNLOAD BUTTON */
    .download-wrap {
      display: flex; justify-content: center; gap: 16px; flex-wrap: wrap;
      position: relative; z-index: 1;
      margin-bottom: 60px;
    }
    .btn-download {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 15px 36px;
      font-family: var(--font-display);
      font-size: 15px; letter-spacing: 3px;
      text-decoration: none; border-radius: 2px;
      background: var(--pink); color: var(--white);
      transition: all 0.25s ease;
    }
    .btn-download:hover {
      background: #ff1a6a;
      box-shadow: 0 0 24px 6px var(--pink-glow), 0 0 48px 12px rgba(226,16,86,0.15);
      transform: translateY(-1px);
    }
    .btn-download.ghost {
      background: transparent;
      border: 1px solid var(--white-20);
    }
    .btn-download.ghost:hover {
      background: transparent;
      border-color: var(--teal);
      color: var(--teal);
      box-shadow: 0 0 24px 6px var(--teal-glow);
    }
    .btn-download svg { width: 16px; height: 16px; fill: currentColor; }

    /* GALLERY */
    .gallery-section {
      padding: 0 0 100px;
      position: relative; z-index: 1;
    }
    .set-label {
      font-family: var(--font-display);
      font-size: 13px; letter-spacing: 4px;
      color: var(--white-60); text-transform: uppercase;
      margin-bottom: 12px;
      padding-top: 48px;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 0;
    }
    @media (max-width: 900px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .gallery-grid { grid-template-columns: 1fr; } }

    .gallery-item {
      position: relative; cursor: pointer;
      border-radius: 3px; overflow: hidden;
      background: var(--navy-light);
      aspect-ratio: 2/3;
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease, box-shadow 0.3s ease;
    }
    .gallery-item.in-view { opacity: 1; transform: translateY(0); }
    .gallery-item:hover {
      box-shadow: 0 0 0 1px var(--pink-glow), 0 8px 32px rgba(226,16,86,0.15);
      transform: translateY(-3px);
    }
    .gallery-item img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.4s ease;
    }
    .gallery-item:hover img { transform: scale(1.04); }
    .gallery-item-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(5,1,33,0.9) 0%, rgba(5,1,33,0.4) 55%, transparent 100%);
      opacity: 0; transition: opacity 0.3s ease;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 14px;
    }
    .gallery-item:hover .gallery-item-overlay { opacity: 1; }
    .photo-num {
      font-family: var(--font-body);
      font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase;
      color: var(--white-60); margin-bottom: 8px;
    }
    .photo-dl-btns { display: flex; gap: 6px; }
    .dl-btn-sm {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px;
      padding: 7px 4px;
      font-family: var(--font-body); font-size: 0.58rem; font-weight: 500;
      letter-spacing: 1.5px; text-transform: uppercase;
      text-decoration: none; border: 1px solid; transition: background 0.2s, color 0.2s;
    }
    .dl-btn-sm svg { width: 9px; height: 9px; flex-shrink: 0; }
    .dl-web { color: var(--teal); border-color: var(--teal); background: rgba(0,180,204,0.1); }
    .dl-web:hover { background: var(--teal); color: var(--navy); }
    .dl-full { color: var(--pink); border-color: var(--pink); background: rgba(226,16,86,0.1); }
    .dl-full:hover { background: var(--pink); color: var(--white); }

    /* FOOTER */
    footer {
      padding: 40px 0; text-align: center;
      position: relative; z-index: 1;
      border-top: 1px solid var(--white-10);
    }
    .footer-copy { font-size: 0.78rem; color: var(--white-60); letter-spacing: 1px; }

    /* LIGHTBOX */
    .lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(3,0,20,0.97);
      z-index: 200; align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 92vw; max-height: 92vh;
      object-fit: contain; border-radius: 2px;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
    }
    .lightbox-close {
      position: absolute; top: 20px; right: 24px;
      font-family: var(--font-display); font-size: 13px; letter-spacing: 3px;
      cursor: pointer; color: var(--white-60); transition: color 0.2s;
    }
    .lightbox-close:hover { color: var(--pink); }
    .lightbox-nav {
      position: absolute; font-size: 28px; cursor: pointer;
      color: var(--white-60); transition: color 0.2s;
      padding: 20px; user-select: none;
    }
    .lightbox-nav:hover { color: var(--teal); }
    .lightbox-prev { left: 16px; }
    .lightbox-next { right: 16px; }
    .lightbox-counter {
      position: absolute; bottom: 20px;
      font-family: var(--font-display); font-size: 13px; letter-spacing: 3px;
      color: var(--white-60);
    }
    .swipe-hint {
      display: none;
      position: absolute; bottom: 52px; right: 24px;
      font-family: var(--font-display); font-size: 36px; letter-spacing: 3px;
      color: #fff; pointer-events: none;
      animation: swipe-glow-pulse 1.6s ease-in-out infinite;
      transition: opacity 0.5s ease;
    }
    .swipe-hint.hidden { opacity: 0; animation: none; }
    @media (max-width: 768px) { .swipe-hint { display: block; } }
    @keyframes swipe-glow-pulse {
      0%, 100% { text-shadow: 0 0 8px #E21056, 0 0 20px #E21056, 0 0 40px #E21056aa; opacity: 0.75; }
      50%       { text-shadow: 0 0 14px #ff3a7a, 0 0 35px #E21056, 0 0 70px #E21056, 0 0 100px #E21056cc; opacity: 1; }
    }

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" onclick="closeLightbox()">✕ CLOSE</span>
    <span class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)">&#8592;</span>
    <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()">
    <span class="lightbox-nav lightbox-next" onclick="lightboxNav(1)">&#8594;</span>
    <span class="lightbox-counter" id="lightbox-counter"></span>
    <span class="swipe-hint" id="swipe-hint">← swipe →</span>
  </div>

  <script>
    // Starfield
    (function() {
      const container = document.getElementById('stars');
      for (let i = 0; i < 200; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() < 0.1 ? (Math.random() * 2 + 1.5) : (Math.random() * 1.2 + 0.3);
        const dur = 2.5 + Math.random() * 5;
        const delay = Math.random() * 6;
        const isGlow = Math.random() < 0.2;
        s.style.cssText = `
          width:${size}px; height:${size}px;
          left:${Math.random()*100}vw; top:${Math.random()*100}vh;
          animation: ${isGlow ? 'twinkle-glow' : 'twinkle'} ${dur}s ${delay}s ease-in-out infinite;
        `;
        container.appendChild(s);
      }
    })();

    // Lightbox
    const photos = Array.from(document.querySelectorAll('.gallery-item img')).map(img => ({
      src: img.src, alt: img.alt
    }));
    let currentIndex = 0;

    function openLightbox(index) {
      currentIndex = index;
      showPhoto();
      document.getElementById('lightbox').classList.add('open');
      document.getElementById('swipe-hint').classList.remove('hidden');
    }
    function showPhoto() {
      const p = photos[currentIndex];
      document.getElementById('lightbox-img').src = p.src.replace('/w_600,', '/w_1920,');
      document.getElementById('lightbox-img').alt = p.alt;
      document.getElementById('lightbox-counter').textContent = (currentIndex + 1) + ' / ' + photos.length;
    }
    function lightboxNav(dir) {
      currentIndex = (currentIndex + dir + photos.length) % photos.length;
      showPhoto();
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.getElementById('lightbox-img').src = '';
    }

    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target === this) closeLightbox();
    });

    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') lightboxNav(1);
      if (e.key === 'ArrowLeft') lightboxNav(-1);
    });

    // Touch swipe
    let touchStartX = 0, touchStartY = 0, isPinch = false, isSwiping = false;
    const lb = document.getElementById('lightbox');
    lb.addEventListener('touchstart', e => {
      if (e.touches.length > 1) { isPinch = true; return; }
      isPinch = false; isSwiping = false;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    lb.addEventListener('touchmove', e => {
      if (e.touches.length > 1) { isPinch = true; return; }
      const dx = e.touches[0].clientX - touchStartX;
      const dy = e.touches[0].clientY - touchStartY;
      if (!isSwiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) isSwiping = true;
    }, { passive: true });
    lb.addEventListener('touchend', e => {
      if (isPinch) { isPinch = false; return; }
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (isSwiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
        lightboxNav(dx < 0 ? 1 : -1);
        document.getElementById('swipe-hint').classList.add('hidden');
      }
      isSwiping = false;
    }, { passive: true });

    // Scroll-in animation
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const items = Array.from(entry.target.closest('.gallery-grid').querySelectorAll('.gallery-item'));
          const col = items.indexOf(entry.target) % 3;
          entry.target.style.transitionDelay = (col * 0.08) + 's';
          entry.target.classList.add('in-view');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.gallery-item').forEach(el => observer.observe(el));

    // Photo IDs
    const webPhotos = [
      'Ro1_dgxpxr','Ro1-2_dgov34','Ro1-3_uu6ytv','Ro1-4_knsoo4','Ro1-5_hyfbp9',
      'Ro1-6_hiswqf','Ro1-7_g2g1k5','Ro1-8_qwjfdo','Ro1-9_vjyytq','Ro1-10_plqdkf',
      'Ro1-11_q2j3ey','Ro1-12_rxynuq','Ro1-13_shkb2r',
      'Ro2_cgqtti','Ro2-2_pwgmmb','Ro2-3_k7ijsk','Ro2-4_pzmtma','Ro2-5_zfs5vu',
      'Ro2-6_l6djef','Ro2-7_vnmqjk','Ro2-8_xnsn3r','Ro2-9_rtvf6e','Ro2-10_zsea6x',
      'Ro2-11_kd96el','Ro2-12_ugentw','Ro2-13_aikeoc','Ro2-14_jtwleu','Ro2-15_mmslur',
      'Ro2-16_j3srge','Ro2-17_pojya5',
      'Ro3_a0qjcn','Ro3-2_payknu','Ro3-3_pvvawy','Ro3-4_tvthvy','Ro3-5_rxiskn',
      'Ro3-6_mthtsp','Ro3-7_e74pbn','Ro3-8_g4l9se','Ro3-9_qngoih','Ro3-10_ddh3sj',
      'Ro3-11_icmyh8','Ro3-12_xwkinb','Ro3-13_vb6ghc','Ro3-14_raswmt','Ro3-15_fcjcqo',
      'Ro3-16_xnppzs','Ro3-17_wtovdi',
      'Ro4_mr29pg','Ro4-2_kwvzbc','Ro4-3_mo7trt','Ro4-4_w4ohhg','Ro4-5_rbkmrc',
      'Ro4-6_v72u1k','Ro4-7_xpsavc'
    ];

    // Per-photo download buttons
    const dlIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
    document.querySelectorAll('.gallery-item').forEach((item, i) => {
      const id = webPhotos[i];
      const overlay = item.querySelector('.gallery-item-overlay');
      overlay.innerHTML = `
        <div class="photo-num">Photo ${i + 1} of ${webPhotos.length}</div>
        <div class="photo-dl-btns">
          <a class="dl-btn-sm dl-full" href="https://res.cloudinary.com/diitxd6ou/image/upload/fl_attachment/${id}" target="_blank" onclick="event.stopPropagation()">${dlIcon} Full Res</a>
        </div>
      `;
    });

  </script>
